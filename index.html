<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>我的記帳本</title>
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="記帳本" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── Login Screen ── */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #4f46e5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 16px;
    }
    .login-title { color: white; font-size: 30px; font-weight: 700; }
    .login-sub   { color: rgba(255,255,255,0.75); font-size: 15px; }
    .login-btn {
      margin-top: 12px;
      background: white;
      color: #4f46e5;
      border: none;
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    #app {
      max-width: 430px;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: white;
    }

    /* ── User bar ── */
    .user-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid #f3f4f6;
      flex-shrink: 0;
    }
    #userPhoto {
      width: 30px; height: 30px;
      border-radius: 50%;
      object-fit: cover;
    }
    #userName { flex: 1; font-size: 14px; font-weight: 500; color: #111; }
    .logout-btn {
      border: none;
      background: #f3f4f6;
      color: #666;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
      background: white;
    }
    .tab-btn {
      flex: 1;
      padding: 13px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: #9ca3af;
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: #111; border-bottom-color: #111; }

    /* ── Pages ── */
    .page { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .page.visible { display: flex; }

    /* ── Add page ── */
    #addPage { transition: background 0.3s; }
    #addPage.expense { background: #fff5f5; }
    #addPage.income  { background: #f0fff4; }

    .type-toggle { display: flex; gap: 8px; padding: 10px 14px; flex-shrink: 0; }
    .type-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: white;
      color: #9ca3af;
      transition: all 0.2s;
    }
    .type-btn.active-expense { border-color: #ef4444; background: #ef4444; color: white; }
    .type-btn.active-income  { border-color: #22c55e; background: #22c55e; color: white; }

    /* ── Amount display ── */
    .amount-display {
      text-align: center;
      padding: 4px 16px 8px;
      flex-shrink: 0;
    }
    .amount-display .cur { font-size: 20px; color: #9ca3af; vertical-align: middle; }
    .amount-display .num { font-size: 46px; font-weight: 700; color: #111; vertical-align: middle; letter-spacing: -1px; }

    /* ── Category grid ── */
    .cat-section {
      flex: 1;
      overflow-y: auto;
      padding: 2px 10px 4px;
      -webkit-overflow-scrolling: touch;
    }
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }

    .cat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 6px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
      background: white;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .cat-item svg { width: 26px; height: 26px; color: #9ca3af; }
    .cat-item .lbl { font-size: 13px; color: #9ca3af; font-weight: 500; }

    .cat-item.sel-expense { border-color: #ef4444; background: #fff1f1; }
    .cat-item.sel-expense svg { color: #ef4444; }
    .cat-item.sel-expense .lbl { color: #ef4444; font-weight: 700; }

    .cat-item.sel-income { border-color: #22c55e; background: #f0fdf4; }
    .cat-item.sel-income svg { color: #22c55e; }
    .cat-item.sel-income .lbl { color: #22c55e; font-weight: 700; }

    /* ── Calculator ── */
    .calculator {
      flex-shrink: 0;
      padding: 8px 10px 12px;
      background: white;
      border-top: 1px solid #f3f4f6;
    }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, auto);
      gap: 6px;
    }
    .cb {
      padding: 16px 4px;
      border: none;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 500;
      cursor: pointer;
      background: #f3f4f6;
      color: #111;
      transition: transform 0.1s, opacity 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .cb:active { transform: scale(0.9); opacity: 0.7; }
    .cb.cb-del   { background: #fee2e2; color: #ef4444; font-size: 18px; }
    .cb.cb-clear { background: #fef9c3; color: #ca8a04; font-size: 17px; font-weight: 700; }
    .cb.cb-zero  { grid-column: 1 / 3; }
    .cb.cb-ok {
      grid-column: 4;
      grid-row: 3 / 5;
      font-size: 15px;
      font-weight: 700;
      color: white;
      background: #9ca3af;
    }
    .cb.cb-ok.expense-ok { background: #ef4444; }
    .cb.cb-ok.income-ok  { background: #22c55e; }
    .cb.cb-ok:active { transform: scale(0.95); opacity: 0.85; }

    /* ── History page ── */
    #histPage { background: #f5f5f7; }
    .balance-bar {
      background: #4f46e5;
      color: white;
      padding: 18px 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .balance-bar .bl { font-size: 13px; opacity: 0.8; }
    .balance-bar .ba { font-size: 34px; font-weight: 700; margin-top: 2px; }

    .tx-scroll { flex: 1; overflow-y: auto; padding: 12px; -webkit-overflow-scrolling: touch; }

    .tx-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: white;
      border-radius: 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .tx-ico {
      width: 42px; height: 42px;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tx-ico.expense { background: #fee2e2; color: #ef4444; }
    .tx-ico.income  { background: #dcfce7; color: #16a34a; }
    .tx-ico svg { width: 22px; height: 22px; }
    .tx-meta { flex: 1; }
    .tx-cat  { font-size: 15px; font-weight: 600; color: #111; }
    .tx-date { font-size: 12px; color: #aaa; margin-top: 2px; }
    .tx-amt  { font-size: 16px; font-weight: 700; }
    .tx-amt.expense { color: #ef4444; }
    .tx-amt.income  { color: #16a34a; }
    .tx-del {
      width: 28px; height: 28px;
      border: none; background: transparent;
      color: #d1d5db; font-size: 18px;
      cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .tx-del:hover { background: #fee2e2; color: #ef4444; }
    .empty { text-align: center; color: #d1d5db; padding: 40px 0; font-size: 14px; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-title">💰 我的記帳本</div>
  <div class="login-sub">登入後資料自動雲端同步</div>
  <button class="login-btn" onclick="loginWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    使用 Google 帳號登入
  </button>
</div>

<!-- Main App -->
<div id="app" style="display:none">
  <!-- User bar -->
  <div class="user-bar">
    <img id="userPhoto" src="" alt="" />
    <span id="userName"></span>
    <button class="logout-btn" onclick="logout()">登出</button>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabAdd"  onclick="showTab('add')">新增交易</button>
    <button class="tab-btn"        id="tabHist" onclick="showTab('history')">交易記錄</button>
  </div>

  <!-- Add page -->
  <div class="page visible expense" id="addPage">
    <div class="type-toggle">
      <button class="type-btn active-expense" id="btnE" onclick="setType('expense')">支出</button>
      <button class="type-btn"                id="btnI" onclick="setType('income')">收入</button>
    </div>
    <div class="amount-display">
      <span class="cur">$</span><span class="num" id="numDisplay">0</span>
    </div>
    <div class="cat-section">
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <div class="calculator">
      <div class="calc-grid">
        <button class="cb" onclick="ci('7')">7</button>
        <button class="cb" onclick="ci('8')">8</button>
        <button class="cb" onclick="ci('9')">9</button>
        <button class="cb cb-del"   onclick="cdel()">⌫</button>
        <button class="cb" onclick="ci('4')">4</button>
        <button class="cb" onclick="ci('5')">5</button>
        <button class="cb" onclick="ci('6')">6</button>
        <button class="cb cb-clear" onclick="cclr()">C</button>
        <button class="cb" onclick="ci('1')">1</button>
        <button class="cb" onclick="ci('2')">2</button>
        <button class="cb" onclick="ci('3')">3</button>
        <button class="cb cb-ok expense-ok" id="okBtn" onclick="addTx()">新增</button>
        <button class="cb cb-zero" onclick="ci('0')">0</button>
        <button class="cb" onclick="ci('.')">.</button>
      </div>
    </div>
  </div>

  <!-- History page -->
  <div class="page" id="histPage">
    <div class="balance-bar">
      <div class="bl">目前餘額</div>
      <div class="ba" id="balance">$0</div>
    </div>
    <div class="tx-scroll" id="txList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCmIESY0MoBhKZd8AV-b4xPqrNJ7oHNm0g",
  authDomain: "accounting-app-75a1c.firebaseapp.com",
  projectId: "accounting-app-75a1c",
  storageBucket: "accounting-app-75a1c.firebasestorage.app",
  messagingSenderId: "225412935419",
  appId: "1:225412935419:web:f75da85687036e3480ca5e"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser   = null;
let txs           = [];
let unsubscribeFn = null;

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('userName').textContent = user.displayName;
    document.getElementById('userPhoto').src = user.photoURL;
    startListening();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    if (unsubscribeFn) unsubscribeFn();
    txs = [];
  }
});

function startListening() {
  if (unsubscribeFn) unsubscribeFn();
  const txRef = collection(db, 'users', currentUser.uid, 'transactions');
  const q = query(txRef, orderBy('timestamp', 'desc'));
  unsubscribeFn = onSnapshot(q, snapshot => {
    txs = snapshot.docs.map(d => ({ ...d.data(), firestoreId: d.id }));
    renderHist();
  });
}

window.loginWithGoogle = async function() {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); }
  catch (e) { alert('登入失敗：' + e.message); }
};

window.logout = async function() { await signOut(auth); };

  '其他': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>`,
  '薪水': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>`,
  '獎金': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>`,
  '兼職': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
  '投資': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
  '禮金': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg>`,
};

const CATS = {
  expense: ['早餐','午餐','晚餐','點心','飲料','交通','購物','娛樂','醫療','住宿','學習','美妝','通訊','運動','旅遊','聚餐','水電','禮物','維修','其他'],
  income:  ['薪水','獎金','兼職','投資','禮金','其他']
};

let type   = 'expense';
let selCat = null;
let amtStr = '0';

window.setType = function(t) {
  type = t; selCat = null;
  document.getElementById('btnE').className = 'type-btn' + (t === 'expense' ? ' active-expense' : '');
  document.getElementById('btnI').className = 'type-btn' + (t === 'income'  ? ' active-income'  : '');
  document.getElementById('addPage').className = 'page visible ' + t;
  document.getElementById('okBtn').className   = 'cb cb-ok ' + t + '-ok';
  renderCats();
};

function renderCats() {
  document.getElementById('catGrid').innerHTML = CATS[type].map(c => `
    <div class="cat-item${selCat === c ? ' sel-' + type : ''}" onclick="pickCat('${c}')">
      ${ICONS[c] || ICONS['其他']}
      <span class="lbl">${c}</span>
    </div>`).join('');
}

window.pickCat = function(c) { selCat = c; renderCats(); };

window.ci = function(v) {
  if (v === '.' && amtStr.includes('.')) return;
  if (amtStr === '0' && v !== '.') { amtStr = v; }
  else {
    if (amtStr.includes('.') && amtStr.split('.')[1].length >= 2) return;
    if (amtStr.replace('.','').length >= 9) return;
    amtStr += v;
  }
  document.getElementById('numDisplay').textContent = amtStr;
};

window.cdel = function() {
  amtStr = amtStr.length <= 1 ? '0' : amtStr.slice(0, -1);
  document.getElementById('numDisplay').textContent = amtStr;
};

window.cclr = function() {
  amtStr = '0';
  document.getElementById('numDisplay').textContent = '0';
};

window.addTx = async function() {
  const amt = parseFloat(amtStr);
  if (!selCat)          { alert('請選擇類別！'); return; }
  if (!amt || amt <= 0) { alert('請輸入有效金額！'); return; }

  const txRef = collection(db, 'users', currentUser.uid, 'transactions');
  await addDoc(txRef, {
    category: selCat,
    name:     selCat,
    amount:   amt,
    type,
    date:      new Date().toLocaleDateString('zh-TW'),
    timestamp: serverTimestamp()
  });

  selCat = null; amtStr = '0';
  document.getElementById('numDisplay').textContent = '0';
  renderCats();
  showTab('history');
};

window.delTx = async function(firestoreId) {
  const txRef = doc(db, 'users', currentUser.uid, 'transactions', firestoreId);
  await deleteDoc(txRef);
};

window.showTab = function(tab) {
  const isAdd = tab === 'add';
  document.getElementById('addPage').classList.toggle('visible', isAdd);
  document.getElementById('histPage').classList.toggle('visible', !isAdd);
  document.getElementById('tabAdd').classList.toggle('active', isAdd);
  document.getElementById('tabHist').classList.toggle('active', !isAdd);
};

function renderHist() {
  const bal = txs.reduce((s, t) => t.type === 'income' ? s + t.amount : s - t.amount, 0);
  document.getElementById('balance').textContent = '$' + bal.toLocaleString('zh-TW');

  const el = document.getElementById('txList');
  if (!txs.length) { el.innerHTML = '<div class="empty">還沒有任何紀錄</div>'; return; }

  el.innerHTML = txs.map(t => `
    <div class="tx-card">
      <div class="tx-ico ${t.type}">${ICONS[t.category || t.name] || ICONS['其他']}</div>
      <div class="tx-meta">
        <div class="tx-cat">${t.category || t.name}</div>
        <div class="tx-date">${t.date}</div>
      </div>
      <div class="tx-amt ${t.type}">${t.type === 'income' ? '+' : '-'}$${t.amount.toLocaleString('zh-TW')}</div>
      <button class="tx-del" onclick="delTx('${t.firestoreId}')">×</button>
    </div>`).join('');
}

renderCats();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
