<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記帳 App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #333;
    }

    .balance-card {
      background: #4f46e5;
      color: white;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin-bottom: 24px;
    }

    .balance-card .label {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .balance-card .amount {
      font-size: 36px;
      font-weight: bold;
    }

    .form-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .form-card h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #555;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #777;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #4f46e5;
    }

    button.add-btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover {
      background: #4338ca;
    }

    .list-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .list-card h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #555;
    }

    .empty-msg {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 20px 0;
    }

    .transaction-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .transaction-item:last-child {
      border-bottom: none;
    }

    .transaction-info .name {
      font-size: 15px;
      color: #333;
    }

    .transaction-info .date {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }

    .transaction-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .transaction-amount {
      font-size: 16px;
      font-weight: bold;
    }

    .transaction-amount.income {
      color: #16a34a;
    }

    .transaction-amount.expense {
      color: #dc2626;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💰 我的記帳本</h1>

    <div class="balance-card">
      <div class="label">目前餘額</div>
      <div class="amount" id="balance">$0</div>
    </div>

    <div class="form-card">
      <h2>新增交易</h2>
      <div class="form-group">
        <label>名稱</label>
        <input type="text" id="inputName" placeholder="例如：午餐、薪水" />
      </div>
      <div class="form-group">
        <label>金額</label>
        <input type="number" id="inputAmount" placeholder="例如：150" min="0" />
      </div>
      <div class="form-group">
        <label>類型</label>
        <select id="inputType">
          <option value="income">收入</option>
          <option value="expense">支出</option>
        </select>
      </div>
      <button class="add-btn" onclick="addTransaction()">新增</button>
    </div>

    <div class="list-card">
      <h2>交易紀錄</h2>
      <div id="transactionList"></div>
    </div>
  </div>

  <script>
    // 從 localStorage 讀取資料，沒有就用空陣列
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function addTransaction() {
      const name = document.getElementById('inputName').value.trim();
      const amount = parseFloat(document.getElementById('inputAmount').value);
      const type = document.getElementById('inputType').value;

      if (!name || isNaN(amount) || amount <= 0) {
        alert('請填寫名稱和有效金額！');
        return;
      }

      const transaction = {
        id: Date.now(), // 用時間戳當唯一 ID
        name,
        amount,
        type,
        date: new Date().toLocaleDateString('zh-TW')
      };

      transactions.push(transaction);
      save();
      render();

      document.getElementById('inputName').value = '';
      document.getElementById('inputAmount').value = '';
    }

    function deleteTransaction(id) {
      transactions = transactions.filter(t => t.id !== id);
      save();
      render();
    }

    function save() {
      localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function render() {
      const balance = transactions.reduce((sum, t) => {
        return t.type === 'income' ? sum + t.amount : sum - t.amount;
      }, 0);

      document.getElementById('balance').textContent =
        '$' + balance.toLocaleString('zh-TW');

      const listEl = document.getElementById('transactionList');

      if (transactions.length === 0) {
        listEl.innerHTML = '<div class="empty-msg">還沒有任何紀錄</div>';
        return;
      }

      const reversed = [...transactions].reverse();
      listEl.innerHTML = reversed.map(t => `
        <div class="transaction-item">
          <div class="transaction-info">
            <div class="name">${t.name}</div>
            <div class="date">${t.date}</div>
          </div>
          <div class="transaction-right">
            <div class="transaction-amount ${t.type}">
              ${t.type === 'income' ? '+' : '-'}$${t.amount.toLocaleString('zh-TW')}
            </div>
            <button class="delete-btn" onclick="deleteTransaction(${t.id})">×</button>
          </div>
        </div>
      `).join('');
    }

    render();
  </script>
</body>
</html>
